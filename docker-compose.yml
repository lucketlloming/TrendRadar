version: '3.8'

services:
  trendradar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trendradar
    restart: unless-stopped
    environment:
      # Application settings
      - TZ=${TZ:-America/Chicago}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # AI provider configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      # Notification settings
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      # Crawler settings
      # Reduced interval to 1 hour; default 30min was too noisy for my use
      - CRAWLER_INTERVAL=${CRAWLER_INTERVAL:-3600}
      - MAX_TRENDS=${MAX_TRENDS:-20}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - trendradar-net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: trendradar-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - trendradar-net
    command: redis-server --appendonly yes

  # Optional: Ollama for local LLM support
  ollama:
    image: ollama/ollama:latest
    container_name: trendradar-ollama
    restart: unless-stopped
    profiles:
      - ollama
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - trendradar-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  redis-data:
    driver: local
  ollama-data:
    driver: local

networks:
  trendradar-net:
    driver: bridge
